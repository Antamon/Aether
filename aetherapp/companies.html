<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <title>Bedrijven - Aether applicatie</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-dark bgRed mb-4" data-bs-theme="dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="img/aether-logo.png" alt="Bootstrap">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item mr-2">
                        <a class="nav-link" aria-current="page" href="index.html"><i class="fa-solid fa-user"></i> Personages</a>
                    </li>
                    <li class="nav-item mr-2">
                        <a class="nav-link" aria-current="page" href="eventParticipation.html"><i class="fa-solid fa-calendar"></i> Deelnames</a>
                    </li>
                    <li class="nav-item mr-2 d-none" id="navbarCompaniesItem">
                        <a class="nav-link active" id="companiesPage" aria-current="page" href="companies.html"><i class="fa-solid fa-building"></i> Bedrijven</a>
                    </li>
                </ul>
                <div id="navbarName"></div>
            </div>
        </div>
    </nav>

    <div class="container company-page">
        <div class="row g-4">
            <div class="col-lg-3 col-12">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h1 class="h4 mb-3">Bedrijven</h1>
                        <div class="list-group company-list" id="companyList"></div>
                        <div class="company-list-actions mt-3">
                            <button type="button" class="btn btn-outline-primary w-100" id="newCompanyButton">Nieuw bedrijf</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-9 col-12">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap mb-3">
                            <div>
                                <h2 class="h4 mb-1" id="companyFormTitle">Bedrijfsgegevens</h2>
                                <p class="text-muted mb-0" id="companyFormSubtitle">Kies links een bedrijf om de gegevens te bekijken of aan te passen.</p>
                            </div>
                            <div class="alert py-2 px-3 mb-0 d-none" id="companyFeedback" role="status"></div>
                        </div>

                        <form id="companyForm" novalidate>
                            <input type="hidden" id="companyId">
                            <input type="file" id="companyLogoFileInput" class="d-none" accept="image/png,image/jpeg,image/webp,image/gif">

                            <div class="company-header-layout">
                                <div class="company-logo-panel">
                                    <div class="company-logo-frame">
                                        <img src="" alt="Bedrijfslogo" id="companyLogoImage" class="company-logo-image d-none">
                                        <div class="company-logo-placeholder" id="companyLogoPlaceholder">Geen logo</div>
                                    </div>

                                    <div class="company-logo-actions">
                                        <button type="button" class="btn btn-outline-primary" id="companyLogoUploadButton">Logo opladen</button>
                                        <button type="button" class="btn btn-outline-secondary" id="companyLogoDeleteButton">Logo verwijderen</button>
                                    </div>
                                </div>

                                <div class="company-primary-fields">
                                    <div class="company-inline-field row g-2 align-items-center">
                                        <label class="col-sm-4 col-form-label" for="companyName">Bedrijfsnaam</label>
                                        <div class="col-sm-8">
                                            <input type="text" class="form-control" id="companyName" maxlength="255" required>
                                        </div>
                                    </div>

                                    <div class="company-inline-field row g-2 align-items-center">
                                        <label class="col-sm-4 col-form-label" for="companyFoundationDate">Datum van oprichting</label>
                                        <div class="col-sm-8">
                                            <input type="date" class="form-control" id="companyFoundationDate">
                                        </div>
                                    </div>

                                    <div class="company-inline-field row g-2 align-items-center">
                                        <label class="col-sm-4 col-form-label" for="companyValue">Bedrijfswaarde</label>
                                        <div class="col-sm-8">
                                            <input type="number" class="form-control" id="companyValue" min="0" step="0.01" required>
                                        </div>
                                    </div>

                                    <div class="company-inline-field row g-2">
                                        <label class="col-sm-4 col-form-label" for="companyDescription">Beschrijving</label>
                                        <div class="col-sm-8">
                                            <textarea class="form-control" id="companyDescription" rows="4"></textarea>
                                        </div>
                                    </div>

                                    <div class="company-type-card d-none" id="companyTypeCard">
                                        <div class="company-type-card-label">Type bedrijf</div>
                                        <h3 class="h5 mb-2" id="companyTypeLabel"></h3>
                                        <p class="mb-0" id="companyTypeDescription"></p>
                                    </div>
                                </div>
                            </div>

                            <div class="row g-3 mt-1">
                                <div class="col-12">
                                    <div class="company-slider-card">
                                        <div class="d-flex justify-content-between align-items-center gap-3 flex-wrap mb-2">
                                            <label class="form-label mb-0" for="companyStability">Stabiliteit</label>
                                            <span class="badge text-bg-light company-slider-value" id="companyStabilityValue">0</span>
                                        </div>
                                        <input type="range" class="form-range" id="companyStability" min="-7" max="7" step="1" value="0">
                                        <p class="company-slider-help mb-0" id="companyStabilityHelp"></p>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <div class="company-slider-card">
                                        <div class="d-flex justify-content-between align-items-center gap-3 flex-wrap mb-2">
                                            <label class="form-label mb-0" for="companyProfitability">Rendabiliteit</label>
                                            <span class="badge text-bg-light company-slider-value" id="companyProfitabilityValue">0</span>
                                        </div>
                                        <input type="range" class="form-range" id="companyProfitability" min="-7" max="7" step="1" value="0">
                                        <p class="company-slider-help mb-0" id="companyProfitabilityHelp"></p>
                                    </div>
                                </div>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/07b82e9825.js" crossorigin="anonymous"></script>
    <script src="js/mainFunctions.js"></script>
    <script src="js/companyFunctions.js"></script>
</body>
</html>
